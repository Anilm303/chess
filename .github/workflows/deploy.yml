name: Deploy Flutter Web to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3

      # Setup Flutter (STABLE COMPATIBLE)
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: stable

      # Clean project
      - name: Clean project
        run: flutter clean

      # Get dependencies
      - name: Get packages
        run: flutter pub get

      # Build web
      - name: Build Flutter Web
        run: flutter build web --release

      # Deploy to Hugging Face
      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@example.com"

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/Anil1515/chess-frontend-static hf

          rm -rf hf/*
          cp -r build/web/* hf/

          cd hf
          git add .
          git commit -m "auto deploy" || echo "no changes"
          git push

name: Deploy Flutter Web to Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HF_USER: ${{ vars.HF_USER || 'Anil1515' }}
      HF_SPACE: ${{ vars.HF_SPACE || 'chess-frontend-static' }}
      HF_REPO_URL: ${{ vars.HF_REPO_URL || format('https://huggingface.co/spaces/{0}/{1}', vars.HF_USER || 'Anil1515', vars.HF_SPACE || 'chess-frontend-static') }}
      API_BASE_URL: https://anil1515-chess-backend.hf.space/api
      SOCKET_BASE_URL: https://anil1515-chess-backend.hf.space

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }} \
            --dart-define=SOCKET_BASE_URL=${{ env.SOCKET_BASE_URL }}

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push build to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN || secrets.HUGGINGFACE_TOKEN || secrets.hf__token }}
        run: |
          set -euo pipefail

          workspace_root="${GITHUB_WORKSPACE}"
          build_dir="${GITHUB_WORKSPACE}/build/web"

          echo "Target Hugging Face Space: ${HF_REPO_URL}"

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "Missing Hugging Face token. Add HF_TOKEN, HUGGINGFACE_TOKEN, or hf__token in GitHub Secrets."
            exit 1
          fi

          git config --global url."https://oauth2:${HF_TOKEN}@huggingface.co/".insteadOf "https://huggingface.co/"
          git lfs install --local

          if ! git ls-remote "${HF_REPO_URL}" HEAD >/dev/null 2>&1; then
            echo "Hugging Face Space not found or not reachable: ${HF_REPO_URL}"
            echo "Create the Space first, or update HF_USER / HF_SPACE / HF_REPO_URL to the exact repo URL."
            exit 1
          fi

          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}/3"
            cd "${workspace_root}"
            rm -rf hf-space
            git clone "${HF_REPO_URL}" hf-space

            preserved_root_files=(.gitattributes .gitignore README.md .nojekyll)
            for preserved_file in "${preserved_root_files[@]}"; do
              if [ -f "hf-space/${preserved_file}" ]; then
                cp "hf-space/${preserved_file}" "${RUNNER_TEMP}/${preserved_file}.bak"
              fi
            done

            rsync -a --delete "${build_dir}"/ hf-space/

            for preserved_file in "${preserved_root_files[@]}"; do
              if [ -f "${RUNNER_TEMP}/${preserved_file}.bak" ]; then
                cp "${RUNNER_TEMP}/${preserved_file}.bak" "hf-space/${preserved_file}"
              fi
            done

            cd hf-space
            git remote set-url origin "${HF_REPO_URL}"
            git remote -v
            git add -A

            if git diff --cached --quiet; then
              echo "No web changes to deploy."
              exit 0
            fi

            git commit -m "Deploy Flutter web from GitHub Actions"

            set +e
            push_output=$(git push --force origin HEAD:main 2>&1)
            push_status=$?
            set -e

            echo "$push_output"

            if [ "$push_status" -eq 0 ]; then
              exit 0
            fi

            if echo "$push_output" | grep -qiE 'stale info|fetch first|non-fast-forward|shallow update not allowed'; then
              echo "Push failed because the Space changed during deploy; retrying with a fresh clone."
              continue
            fi

            exit "$push_status"
          done

          echo "Push failed after 3 attempts."
          exit 1

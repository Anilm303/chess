name: Deploy Flutter Web to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v3

      # 2. Setup Flutter (stable safe version)
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: stable

      # 3. Fix dependencies (important for errors)
      - name: Clean & Get Packages
        run: |
          flutter clean
          flutter pub get

      # 4. Build web
      - name: Build Flutter Web
        run: flutter build web --release

      # 5. Deploy to Hugging Face
      - name: Deploy to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@example.com"

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/Anil1515/chess-frontend-static hf

          rm -rf hf/*
          cp -r build/web/* hf/

          cd hf
          git add .
          git commit -m "auto deploy from GitHub" || echo "no changes"
          git push

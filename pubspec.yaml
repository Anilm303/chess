name: chess_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.0.0
  shared_preferences: ^2.2.0

  # API
  http: ^1.1.0
  socket_io_client: ^2.0.0

  # WebRTC (FIXED VERSION)
  flutter_webrtc: 0.9.48+hotfix.1

  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  flutter_callkit_incoming: 3.0.0
  connectivity_plus: ^6.0.0

  # Media
  image_picker: ^1.0.0
  video_player: ^2.9.2

  # Emoji (FIXED)
  emoji_picker_flutter: 3.0.0

  # Utilities
  crypto: ^3.0.2
  intl: ^0.19.0
  uuid: ^4.5.3

  # Face detection
  camera: ^0.11.0+1
  google_mlkit_face_detection: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env.example
